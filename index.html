<title>福冈九州之旅 2026</title>
<style>
:root {
  --ink:#1a1714; --ink-soft:#5a524a; --ink-muted:#9a8f85;
  --paper:#faf7f2; --paper-warm:#f2ede4; --paper-card:#ffffff;
  --accent:#c0392b;
  --d1:#e8406a; --d2:#e8931a; --d3:#3aab5e; --d4:#6b4f8a; --d5:#2c5f8a; --d6:#888;
  --gold:#b8860b; --gold-light:#f5e6c0;
  --teal:#2e7d6e; --teal-light:#d4ede9;
  --blue:#2c5f8a; --blue-light:#dceaf5;
  --green:#4a7c3f; --green-light:#deebd8;
  --purple:#6b4f8a; --purple-light:#e8dff5;
  --border:rgba(26,23,20,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.6}

/* ── HEADER ── */
.header{background:var(--ink);color:var(--paper);padding:28px 20px 22px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(192,57,43,0.15)}
.hlabel{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px}
.htitle{font-family:'Georgia','STSong','SimSun',serif;font-size:26px;font-weight:600;line-height:1.2}
.htitle span{color:var(--accent)}
.hsub{font-size:11px;color:rgba(250,247,242,0.5);margin-top:8px}
.htags{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.htag{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.08);color:rgba(250,247,242,0.8);border:0.5px solid rgba(255,255,255,0.15)}
.htag.red{background:rgba(192,57,43,0.25);color:#f0a89e;border-color:rgba(192,57,43,0.3)}

/* ── NAV ── */
.nav-wrap{position:sticky;top:0;z-index:200;background:var(--paper);border-bottom:0.5px solid var(--border);padding:10px 16px}
.nav-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav-scroll::-webkit-scrollbar{display:none}
.npill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border);background:var(--paper-card);color:var(--ink-soft);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.npill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

.content{padding:16px}

/* ── ILLUSTRATED MAP ── */
.map-outer{background:var(--paper-card);border-radius:20px;border:0.5px solid var(--border);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 16px rgba(26,23,20,0.06)}
.map-title-bar{padding:14px 18px 10px;border-bottom:0.5px solid var(--border)}
.map-title-bar h2{font-family:'Georgia','STSong','SimSun',serif;font-size:15px;font-weight:600;color:var(--ink)}
.map-title-bar p{font-size:11px;color:var(--ink-muted);margin-top:2px}
.map-svg-area{padding:0;position:relative;line-height:0}

/* legend row */
.legend-row{display:flex;flex-wrap:wrap;gap:6px 12px;padding:10px 16px 14px;border-top:0.5px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink-soft)}
.leg-line{width:18px;height:2.5px;border-radius:2px;flex-shrink:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* city jump cards */
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.city-card{background:var(--paper-card);border-radius:12px;border:0.5px solid var(--border);padding:12px;cursor:pointer;transition:all 0.15s}
.city-card:active{transform:scale(0.97);background:var(--paper-warm)}
.city-dot{width:10px;height:10px;border-radius:50%;margin-bottom:8px}
.city-name{font-size:13px;font-weight:500;margin-bottom:2px}
.city-days{font-size:10px;color:var(--ink-muted)}
.city-arrow{font-size:10px;color:var(--accent);margin-top:6px}

/* ── DAY BLOCK ── */
.day-block{margin-bottom:20px}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:14px 16px;background:var(--paper-card);border-radius:16px;border:0.5px solid var(--border);box-shadow:0 1px 8px rgba(26,23,20,0.04)}
.day-num{font-family:'Georgia','STSong','SimSun',serif;font-size:22px;font-weight:600;color:var(--accent);line-height:1;min-width:32px}
.day-info{flex:1}
.day-date{font-size:13px;font-weight:500}
.day-theme{font-size:11px;color:var(--ink-muted);margin-top:1px}
.day-badge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500;white-space:nowrap}

.notice{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.ni{flex-shrink:0;font-size:14px;margin-top:-1px}
.n-warn{background:#fff8ec;color:#7a4e00;border-left:3px solid #e6a817}
.n-new{background:#f0f8ee;color:#2e5a27;border-left:3px solid #5a9e4a}
.n-info{background:#eef5fc;color:#1a4570;border-left:3px solid #3a7ec0}
.n-book{background:#fef0ef;color:#7a1f1a;border-left:3px solid var(--accent)}

.sc{background:var(--paper-card);border-radius:16px;border:0.5px solid var(--border);padding:14px 14px 4px;box-shadow:0 1px 8px rgba(26,23,20,0.04);margin-bottom:8px}
.ti{display:grid;grid-template-columns:54px 18px 1fr;gap:0 10px;min-height:46px;align-items:start}
.tt{font-size:11px;color:var(--ink-muted);text-align:right;padding-top:4px;line-height:1.3}
.tc{display:flex;flex-direction:column;align-items:center}
.td{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl{flex:1;width:1px;background:var(--border);min-height:26px}
.tn{padding-bottom:10px;padding-top:2px}
.tit{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}
.tis{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.tag-metro{background:var(--blue-light);color:var(--blue)}
.tag-walk{background:var(--green-light);color:var(--green)}
.tag-jr{background:var(--gold-light);color:var(--gold)}
.tag-bus{background:#fce8f0;color:#8a2e5a}
.tag-shin{background:var(--purple-light);color:var(--purple)}
.tag-boat{background:var(--blue-light);color:var(--blue)}
.tag-taxi{background:#fde8e0;color:#8a3a20}
.tag-tram{background:var(--teal-light);color:var(--teal)}
.tag-new{background:var(--green-light);color:var(--green)}
.tag-book{background:#fde8e0;color:var(--accent)}
.rl{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:8px;background:var(--paper-warm);border:0.5px solid var(--border);color:var(--blue);text-decoration:none;margin-top:5px}
.dot-meal{background:#c0392b}.dot-tr{background:#2c5f8a}.dot-shop{background:#2e7d6e}
.dot-sight{background:#6b4f8a}.dot-hotel{background:#888}.dot-bk{background:#c0731a}

.footer{text-align:center;padding:24px 20px 40px;color:var(--ink-muted);font-size:11px}
.footer strong{color:var(--ink-soft)}
</style>
</head>

function renderOverview() {
  return `
  <div style="margin-bottom:20px">
    <div class="map-outer">
      <div class="map-title-bar">
        <h2>Trip Route Overview</h2>
        <p>点击地图上的城市标记，查看当日详细行程</p>
      </div>
      <div class="map-svg-area">${buildIllustratedMap()}</div>
      <div class="legend-row">
        <div class="leg"><div class="leg-line" style="background:#e8406a"></div>Day1 到达</div>
        <div class="leg"><div class="leg-line" style="background:#e8931a"></div>Day2 购物</div>
        <div class="leg"><div class="leg-line" style="background:#3aab5e"></div>Day3 →日田</div>
        <div class="leg"><div class="leg-line" style="background:#6b4f8a"></div>Day4 →熊本</div>
        <div class="leg"><div class="leg-line" style="background:#2c5f8a"></div>Day5 天草</div>
      </div>
    </div>
    <div class="city-grid">
      ${[
        {name:'福冈·博多',days:'Day 1·2·3出发·5返·6',color:'#e8406a',id:0},
        {name:'日田',days:'Day 3晚 · Day 4早',color:'#3aab5e',id:2},
        {name:'熊本',days:'Day 4 · Day 5出发',color:'#6b4f8a',id:3},
        {name:'天草',days:'Day 5（海豚观赏）',color:'#2c5f8a',id:4},
      ].map(c=>`
        <div class="city-card" onclick="setDay(${c.id})">
          <div class="city-dot" style="background:${c.color}"></div>
          <div class="city-name">${c.name}</div>
          <div class="city-days">${c.days}</div>
          <div class="city-arrow">查看行程 →</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderDay(day) {
  const noticesHtml = day.notices.map(n=>
    `<div class="notice ${n.type}"><span class="ni">${n.icon}</span><span>${n.text}</span></div>`
  ).join('');
  const itemsHtml = day.items.map((item,i)=>{
    const isLast=i===day.items.length-1;
    const tagsHtml=(item.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('');
    const linkHtml=item.link?`<br><a class="rl" href="${item.link.url}" target="_blank">🔗 ${item.link.text}</a>`:'';
    return `<div class="ti">
      <div class="tt">${item.time}</div>
      <div class="tc"><div class="td ${item.dot}"></div>${!isLast?'<div class="tl"></div>':''}</div>
      <div class="tn">
        <div class="tit">${item.title}</div>
        ${item.sub?`<div class="tis">${item.sub}</div>`:''}
        ${tagsHtml?`<div class="tags">${tagsHtml}</div>`:''}
        ${linkHtml}
      </div>
    </div>`;
  }).join('');
  return `<div class="day-block" id="day-${day.id}">
    <div class="day-header">
      <div class="day-num">${day.num}</div>
      <div class="day-info"><div class="day-date">${day.date}</div><div class="day-theme">${day.theme}</div></div>
      <span class="day-badge" style="background:${day.badge.bg};color:${day.badge.color}">${day.badge.text}</span>
    </div>
    ${noticesHtml}
    <div class="sc"><div>${itemsHtml}</div></div>
  </div>`;
}

let active=-1;
function renderNav(){
  document.getElementById('nav').innerHTML=
    `<button class="npill ${active===-1?'active':''}" onclick="setDay(-1)">总览</button>`+
    days.map(d=>`<button class="npill ${active===d.id?'active':''}" onclick="setDay(${d.id})">${d.label}</button>`).join('');
}
function setDay(id){
  active=id; renderNav();
  document.getElementById('content').innerHTML=
    id===-1 ? renderOverview()+days.map(renderDay).join('') : renderDay(days[id]);
  window.scrollTo({top:0,behavior:'smooth'});
}
setDay(-1);
</script>
</body>
</html>
